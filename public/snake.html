<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    :root { --bg: #0f172a; --accent: #22c55e; --text: #e2e8f0; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text); font-family: Inter, Segoe UI, sans-serif;
    }
    .wrap { text-align: center; }
    h1 { margin: 0 0 8px; }
    p { color: #94a3b8; margin: 0 0 16px; }
    canvas {
      border: 2px solid #334155; border-radius: 12px;
      background: #020617; box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    .score { margin-top: 12px; font-weight: 700; }
    a { color: #38bdf8; }
  </style>
</head>
<body data-testid="snake-page">
  <div class="wrap">
    <h1>🐍 Snake Game</h1>
    <p>Gunakan tombol panah untuk bermain</p>
    <canvas id="board" width="400" height="400" data-testid="snake-canvas"></canvas>
    <div class="score" data-testid="snake-score">Skor: 0</div>
    <p><a href="/">← Kembali ke Chatbot</a></p>
  </div>
  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector('[data-testid="snake-score"]');
    const size = 20;
    let snake = [{ x: 10, y: 10 }];
    let dir = { x: 1, y: 0 };
    let food = { x: 15, y: 15 };
    let score = 0;
    let alive = true;

    function randFood() {
      food = {
        x: Math.floor(Math.random() * (canvas.width / size)),
        y: Math.floor(Math.random() * (canvas.height / size)),
      };
    }

    function draw() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#22c55e";
      snake.forEach((p) => ctx.fillRect(p.x * size, p.y * size, size - 1, size - 1));
      ctx.fillStyle = "#ef4444";
      ctx.fillRect(food.x * size, food.y * size, size - 1, size - 1);
    }

    function tick() {
      if (!alive) return;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.y < 0 || head.x >= canvas.width / size || head.y >= canvas.height / size) {
        alive = false; scoreEl.textContent = "Game Over! Skor: " + score; return;
      }
      if (snake.some((p) => p.x === head.x && p.y === head.y)) {
        alive = false; scoreEl.textContent = "Game Over! Skor: " + score; return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = "Skor: " + score;
        randFood();
      } else {
        snake.pop();
      }
      draw();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp" && dir.y !== 1) dir = { x: 0, y: -1 };
      if (e.key === "ArrowDown" && dir.y !== -1) dir = { x: 0, y: 1 };
      if (e.key === "ArrowLeft" && dir.x !== 1) dir = { x: -1, y: 0 };
      if (e.key === "ArrowRight" && dir.x !== -1) dir = { x: 1, y: 0 };
    });

    draw();
    setInterval(tick, 120);
  </script>
</body>
</html>
