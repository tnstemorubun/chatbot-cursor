<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor AI Chatbot</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --panel-2: #1a2230;
      --border: #2a3444;
      --text: #e8edf5;
      --muted: #9aa7bd;
      --accent: #6ee7b7;
      --accent-2: #38bdf8;
      --user: #1d4ed8;
      --assistant: #1f2937;
      --danger: #f87171;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 30%), radial-gradient(circle at bottom right, rgba(110, 231, 183, 0.1), transparent 28%), #0b0f14;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      height: min(88vh, 860px);
      background: rgba(18, 24, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041018;
      font-weight: 800;
      font-size: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode-bar {
      display: flex;
      gap: 6px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.08);
    }

    .mode-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: 0.2s ease;
    }

    .mode-btn:hover {
      border-color: var(--accent-2);
      color: var(--text);
    }

    .mode-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(110, 231, 183, 0.08);
    }

    .mode-icon {
      font-size: 14px;
      line-height: 1;
    }

    .model-badge, button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      font: inherit;
    }

    .model-badge {
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 12px;
      font-size: 14px;
      color: var(--accent);
      white-space: nowrap;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      border-color: var(--accent-2);
      transform: translateY(-1px);
    }

    .status {
      padding: 10px 22px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status.error {
      color: var(--danger);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(110, 231, 183, 0.8);
    }

    .messages {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .bubble.workspace {
      font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .empty {
      margin: auto;
      text-align: center;
      max-width: 520px;
      color: var(--muted);
      line-height: 1.6;
    }

    .empty strong {
      color: var(--text);
      display: block;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .message {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn 0.25s ease;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: rgba(29, 78, 216, 0.25);
      color: #bfdbfe;
    }

    .message.assistant .avatar {
      background: rgba(56, 189, 248, 0.18);
      color: #bae6fd;
    }

    .bubble {
      max-width: min(78%, 640px);
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid transparent;
    }

    .message.user .bubble {
      background: rgba(29, 78, 216, 0.18);
      border-color: rgba(59, 130, 246, 0.25);
      border-top-right-radius: 6px;
    }

    .message.assistant .bubble {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.06);
      border-top-left-radius: 6px;
    }

    .thinking {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    .composer {
      padding: 18px 22px 22px;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.12);
    }

    .composer-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }

    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 180px;
      resize: vertical;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      line-height: 1.5;
      padding: 8px 10px;
    }

    .send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041018;
      border: none;
      font-weight: 700;
      min-width: 96px;
      height: 48px;
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .app { height: 92vh; border-radius: 18px; }
      .header { flex-direction: column; align-items: stretch; }
      .controls { width: 100%; }
      .model-badge, button { width: 100%; }
      .bubble { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app" data-testid="chat-app">
    <header class="header">
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <h1>Cursor AI Chatbot</h1>
          <p id="userInfo">Memuat koneksi API...</p>
          <p id="repoInfo" style="margin:2px 0 0;font-size:12px;color:var(--muted)"></p>
        </div>
      </div>
      <div class="controls">
        <span class="model-badge">Composer 2</span>
        <button id="newChatBtn" type="button">Chat Baru</button>
      </div>
    </header>

    <div class="mode-bar" role="tablist" aria-label="Mode Cursor">
      <button type="button" class="mode-btn" data-mode="agent" data-testid="mode-agent">
        <span class="mode-icon">∞</span> Agent
      </button>
      <button type="button" class="mode-btn" data-mode="plan" data-testid="mode-plan">
        <span class="mode-icon">☰</span> Plan
      </button>
      <button type="button" class="mode-btn" data-mode="debug" data-testid="mode-debug">
        <span class="mode-icon">🐛</span> Debug
      </button>
      <button type="button" class="mode-btn" data-mode="multitask" data-testid="mode-multitask">
        <span class="mode-icon">◎</span> Multitask
      </button>
      <button type="button" class="mode-btn active" data-mode="ask" data-testid="mode-ask">
        <span class="mode-icon">💬</span> Ask
      </button>
    </div>

    <div id="statusBar" class="status">
      <span class="dot"></span>
      <span id="statusText">Menghubungkan ke Cursor API...</span>
    </div>

    <main id="messages" class="messages">
      <div class="empty">
        <strong>Selamat datang</strong>
        Mode <b>Agent</b> = CRUD file + terminal di workspace ini.
        Contoh: <code>jalankan: dir</code>, <code>baca file server.js</code>, <code>help</code>
      </div>
    </main>

    <form id="chatForm" class="composer">
      <div class="composer-box">
        <textarea
          id="messageInput"
          data-testid="message-input"
          placeholder="Ketik pesan Anda di sini..."
          rows="2"
          required
        ></textarea>
        <button id="sendBtn" class="send-btn" type="submit" data-testid="send-btn">Kirim</button>
      </div>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusBar = document.getElementById("statusBar");
    const statusText = document.getElementById("statusText");
    const userInfo = document.getElementById("userInfo");
    const repoInfo = document.getElementById("repoInfo");
    const newChatBtn = document.getElementById("newChatBtn");
    const modeButtons = document.querySelectorAll(".mode-btn");

    let agentId = null;
    let currentMode = "ask";
    let isSending = false;

    const MODE_LABELS = {
      agent: "Agent",
      plan: "Plan",
      debug: "Debug",
      multitask: "Multitask",
      ask: "Ask",
    };

    function setActiveMode(mode) {
      currentMode = mode;
      sessionStorage.setItem("chatMode", mode);
      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
      setStatus(`Mode ${MODE_LABELS[mode]} · Siap`);
    }

    const savedMode = sessionStorage.getItem("chatMode");
    if (savedMode && MODE_LABELS[savedMode]) {
      setActiveMode(savedMode);
    }

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => setActiveMode(btn.dataset.mode));
    });

    function setStatus(text, isError = false) {
      statusText.textContent = text;
      statusBar.classList.toggle("error", isError);
    }

    function clearEmptyState() {
      const empty = messagesEl.querySelector(".empty");
      if (empty) empty.remove();
    }

    function createMessage(role, text = "") {
      clearEmptyState();

      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "U" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return bubble;
    }

    async function loadHealth() {
      try {
        const [healthRes, repoRes] = await Promise.all([
          fetch("/api/health"),
          fetch("/api/repo"),
        ]);
        const data = await healthRes.json();
        const repo = await repoRes.json().catch(() => ({}));

        if (!data.ok) {
          throw new Error(data.error || "API key tidak valid");
        }

        userInfo.textContent = `${data.user.name || "User"} · ${data.user.email}`;
        if (repo.connected) {
          const shortRepo = repo.repo.url.replace("https://github.com/", "");
          repoInfo.textContent = `Repo: ${shortRepo}@${repo.repo.branch} · lokal ${repo.git.head || "-"}`;
        } else {
          repoInfo.textContent = "Repo GitHub belum dikonfigurasi";
        }
        setStatus(`Mode ${MODE_LABELS[currentMode]} · Siap`);
      } catch (error) {
        userInfo.textContent = "Gagal terhubung";
        repoInfo.textContent = "";
        setStatus(error.message, true);
      }
    }

    function parseSseChunk(chunk, onEvent) {
      const blocks = chunk.split("\n\n");

      for (const block of blocks) {
        if (!block.trim()) continue;

        const lines = block.split("\n");
        let eventName = "message";
        let dataLine = "";

        for (const line of lines) {
          if (line.startsWith("event:")) eventName = line.slice(6).trim();
          if (line.startsWith("data:")) dataLine += line.slice(5).trim();
        }

        if (!dataLine) continue;

        try {
          onEvent(eventName, JSON.parse(dataLine));
        } catch {
          // abaikan
        }
      }
    }

    async function sendMessage(message) {
      isSending = true;
      sendBtn.disabled = true;
      setStatus(`Mode ${MODE_LABELS[currentMode]} · Sedang mengetik...`);

      createMessage("user", message);
      const assistantBubble = createMessage("assistant", "");

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, agentId, mode: currentMode }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || "Gagal mengirim pesan");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";

          for (const part of parts) {
            parseSseChunk(part + "\n\n", (eventName, payload) => {
              if (eventName === "meta" && payload.agentId) {
                agentId = payload.agentId;
              }

              if (eventName === "meta" && payload.source === "workspace-agent") {
                assistantBubble.classList.add("workspace");
              }

              if (eventName === "reload") {
                setTimeout(() => window.location.reload(), 600);
              }

              if (eventName === "sync") {
                const note = payload.ok
                  ? `\n\n🔄 ${payload.message || "Sinkronisasi repo selesai."}`
                  : `\n\n⚠️ Sinkronisasi gagal: ${payload.error || "unknown"}`;
                assistantBubble.textContent += note;
                if (payload.prUrl) {
                  assistantBubble.textContent += `\nPR: ${payload.prUrl}`;
                }
                loadHealth();
              }

              if (eventName === "navigate" && payload.url) {
                setTimeout(() => {
                  window.location.href = payload.url;
                }, 800);
              }

              if (eventName === "delta" && payload.text) {
                assistantBubble.textContent += payload.text;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }

              if (eventName === "result" && payload.text && !assistantBubble.textContent.trim()) {
                assistantBubble.textContent = payload.text;
              }

              if (eventName === "error") {
                throw new Error(payload.message || "Terjadi error dari Cursor API");
              }
            });
          }
        }

        if (!assistantBubble.textContent.trim()) {
          assistantBubble.textContent = "Maaf, belum ada respons. Coba kirim ulang.";
        }

        setStatus(`Mode ${MODE_LABELS[currentMode]} · Siap`);
      } catch (error) {
        assistantBubble.textContent = "Error: " + error.message;
        setStatus(error.message, true);
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (isSending) return;

      const message = messageInput.value.trim();
      if (!message) return;

      messageInput.value = "";
      await sendMessage(message);
    });

    newChatBtn.addEventListener("click", () => {
      agentId = null;
      messagesEl.innerHTML = `
        <div class="empty">
          <strong>Chat baru dimulai</strong>
          Sesi sebelumnya direset. Kirim pesan untuk memulai percakapan baru.
        </div>
      `;
      setStatus(`Mode ${MODE_LABELS[currentMode]} · Siap`);
      messageInput.focus();
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    loadHealth();
  </script>
</body>
</html>
